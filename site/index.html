<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>recgov.me — Cabin Cancellation Alerts</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main>
    <h1>recgov.me</h1>
    <p class="subtitle">Get emailed when Alaska cabin cancellations appear on Recreation.gov</p>

    <form id="watch-form">
      <!-- Cabin picker -->
      <label for="cabin-search">Cabin</label>
      <div class="cabin-picker">
        <input
          type="text"
          id="cabin-search"
          placeholder="Search for a cabin..."
          autocomplete="off"
          required
        />
        <ul id="cabin-results" class="dropdown" hidden></ul>
        <input type="hidden" id="cabin-id" />
        <input type="hidden" id="cabin-name" />
      </div>

      <!-- Date range -->
      <label for="date-start">Dates to watch</label>
      <div class="date-row">
        <input type="date" id="date-start" required />
        <span>to</span>
        <input type="date" id="date-end" required />
      </div>

      <!-- Weekends only -->
      <label class="checkbox-label">
        <input type="checkbox" id="weekends-only" />
        Weekends only (Fri &amp; Sat nights)
      </label>

      <!-- Email -->
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="you@example.com" required />

      <button type="submit" id="submit-btn">Watch this cabin</button>
    </form>

    <div id="success" class="success" hidden>
      <strong>You're set!</strong> We'll email you when an opening appears.
    </div>

    <div id="error" class="error" hidden></div>

    <footer>
      <p>
        We check Recreation.gov every 5 minutes. No account needed.
        <br />Unsubscribe anytime via the link in the alert email.
      </p>
    </footer>
  </main>

  <script src="app.js"></script>
</body>
</html>
